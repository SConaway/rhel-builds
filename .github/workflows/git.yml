name: Build git

on:
  push:
    paths:
      - 'packages/git/**'
      - 'build.sh'
      - '.github/workflows/git.yml'
    tags:
      - 'git-v*'
  pull_request:
    paths:
      - 'packages/git/**'
      - 'build.sh'
      - '.github/workflows/git.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rhel_version: [rhel8]  # add rhel9 if rhel8 build doesn't run on RHEL9

    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.rhel_version }}
        run: ./build.sh git ${{ matrix.rhel_version }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: git-${{ matrix.rhel_version }}
          path: output/git/${{ matrix.rhel_version }}/
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/git-v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: false

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#git-v}"

          gh release create "${TAG}" \
            --title "git v${VERSION}" \
            --notes "Binary builds of [git v${VERSION}](https://github.com/git/git/releases/tag/v${VERSION}) for RHEL8/9 (built on AlmaLinux 8)." \
            artifacts/**/*.tar.gz \
            artifacts/**/*.sha256
